name: Release Chart

"on":
  pull_request:
    branches: [main]
    paths:
      - contrib/chart/**
      - .github/workflows/release-chart.yml
  push:
    branches: [main]
    paths:
      - contrib/chart/**
      - .github/workflows/release-chart.yml

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v4.1.1

      - name: Add chart repositories
        run: helm repo add onepassword https://1password.github.io/connect-helm-charts

      - name: Build chart dependencies
        run: helm dependency build contrib/chart

      - name: Lint chart
        run: helm lint contrib/chart

      - name: Test staged compatibility rendering
        run: bash contrib/chart/tests/test_overlay_image_compat.sh

      - name: Install yq
        uses: mikefarah/yq@5a7e72a743649b1b3a47d1a1d8214f3453173c51 # v4

      - name: Validate chart version bump
        run: |
          set -euo pipefail
          chart_yaml="contrib/chart/Chart.yaml"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags origin "${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"
            base_ref="origin/${GITHUB_BASE_REF}"
          else
            base_ref="HEAD~1"
          fi
          changed_files="$(git diff --name-only "${base_ref}...HEAD" 2>/dev/null || true)"
          previous_version="$(git show "${base_ref}:${chart_yaml}" 2>/dev/null | yq '.version' 2>/dev/null || true)"
          if ! grep -q '^contrib/chart/' <<<"$changed_files"; then
            echo "No chart changes detected"
            exit 0
          fi
          current_version="$(yq '.version' "$chart_yaml")"
          if [ -n "$previous_version" ] && [ "$current_version" != "$previous_version" ]; then
            echo "Version already bumped ($previous_version -> $current_version)"
            exit 0
          fi
          echo "::error file=${chart_yaml}::contrib/chart changed but chart version stayed at ${current_version}. Bump .version in the PR."
          exit 1
