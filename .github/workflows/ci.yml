name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci_changes:
    name: Detect CI changes
    runs-on: ubuntu-latest
    outputs:
      migration_order: ${{ steps.filter.outputs.migration_order }}
      rust_api: ${{ steps.filter.outputs.rust_api }}
      slack_archive_privacy: ${{ steps.filter.outputs.slack_archive_privacy }}
      slackbotv2_tests: ${{ steps.filter.outputs.slackbotv2_tests }}
      discordbot_checks: ${{ steps.filter.outputs.discordbot_checks }}
      githubbot_checks: ${{ steps.filter.outputs.githubbot_checks }}
      teamsbot_checks: ${{ steps.filter.outputs.teamsbot_checks }}
      shared_node_packages: ${{ steps.filter.outputs.shared_node_packages }}
      python_surfaces: ${{ steps.filter.outputs.python_surfaces }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Audit workflow trust boundaries
        run: |
          set -euo pipefail
          python .github/scripts/audit_workflow_trust.py
          bash .github/scripts/test-resolve-runnable-image-digest.sh
          bash .github/scripts/test-verify-registry-tag-absent.sh
          bash .github/scripts/test-verify-reviewed-image-release.sh

      - id: filter
        name: Detect changed paths
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            changed_files="$(git diff --name-only "${base}...HEAD")"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            changed_files="$(git diff --name-only "${{ github.event.before }}...HEAD")"
          else
            git fetch --no-tags --depth=1 origin main
            changed_files="$(git diff --name-only origin/main...HEAD)"
          fi

          matches() {
            local pattern
            for pattern in "$@"; do
              if printf '%s\n' "${changed_files}" | grep -Eq "${pattern}"; then
                return 0
              fi
            done
            return 1
          }

          set_output() {
            local name="$1"
            shift
            if matches "$@"; then
              echo "${name}=true" >>"${GITHUB_OUTPUT}"
            else
              echo "${name}=false" >>"${GITHUB_OUTPUT}"
            fi
          }

          set_output migration_order \
            '^services/api-rs/crates/centaur-session-sqlx/migrations/' \
            '^services/console/db/migrate/' \
            '^\.github/scripts/check-migration-order\.sh$' \
            '^\.github/workflows/ci\.yml$'
          set_output rust_api \
            '^services/api-rs/' \
            '^\.github/workflows/ci\.yml$'
          set_output slack_archive_privacy \
            '^workflows/slack/archive_import\.py$' \
            '^workflows/slack/tests/test_archive_import\.py$' \
            '^\.github/workflows/ci\.yml$'
          set_output slackbotv2_tests \
            '^services/slackbotv2/' \
            '^package\.json$' \
            '^pnpm-lock\.yaml$' \
            '^pnpm-workspace\.yaml$' \
            '^\.github/workflows/ci\.yml$'
          set_output discordbot_checks \
            '^services/discordbot/' \
            '^package\.json$' \
            '^pnpm-lock\.yaml$' \
            '^pnpm-workspace\.yaml$' \
            '^\.github/workflows/ci\.yml$'
          set_output githubbot_checks \
            '^services/githubbot/' \
            '^package\.json$' \
            '^pnpm-lock\.yaml$' \
            '^pnpm-workspace\.yaml$' \
            '^\.github/workflows/ci\.yml$'
          set_output teamsbot_checks \
            '^services/teamsbot/' \
            '^package\.json$' \
            '^pnpm-lock\.yaml$' \
            '^pnpm-workspace\.yaml$' \
            '^\.github/workflows/ci\.yml$'
          set_output shared_node_packages \
            '^packages/(api-client|harness-events|rendering)/' \
            '^package\.json$' \
            '^pnpm-lock\.yaml$' \
            '^pnpm-workspace\.yaml$' \
            '^\.github/workflows/ci\.yml$'
          set_output python_surfaces \
            '^services/sandbox/' \
            '^services/workflow-python/' \
            '^workflows/' \
            '^tools/productivity/slack/' \
            '^\.github/workflows/ci\.yml$'

  migration-order:
    name: Migration order
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.migration_order == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check migration versions
        run: .github/scripts/check-migration-order.sh "origin/${{ github.base_ref || 'main' }}"

  rust-api:
    name: Rust API fmt, clippy, and tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.rust_api == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: services/api-rs

      - name: Format
        working-directory: services/api-rs
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: services/api-rs
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Start Rust test database
        run: |
          docker run --detach --name centaur-rust-test-postgres \
            --publish 127.0.0.1:5432:5432 \
            --env POSTGRES_USER=postgres \
            --env POSTGRES_PASSWORD=postgres \
            paradedb/paradedb:0.23.0-pg16@sha256:e41e0c742ef91ece4fc7c08dda7f24e5a8f818563b164bbfea3a4364941d75f7 \
            -c shared_preload_libraries=pg_search,pg_cron \
            -c max_connections=500
          for _attempt in {1..60}; do
            if docker logs centaur-rust-test-postgres 2>&1 \
              | grep -q 'PostgreSQL init process complete' \
              && docker exec centaur-rust-test-postgres \
              psql -U postgres -d postgres -tAc 'select 1' >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs centaur-rust-test-postgres
          exit 1

      - name: Test
        working-directory: services/api-rs
        env:
          SESSION_SQLX_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          SESSION_RUNTIME_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: cargo test --workspace

      - name: Start API integration test dependencies
        run: |
          docker run --detach --name centaur-api-integration-test-postgres \
            --publish 127.0.0.1:15432:5432 \
            --env POSTGRES_USER=postgres \
            --env POSTGRES_PASSWORD=postgres \
            --env POSTGRES_DB=centaur \
            paradedb/paradedb:0.23.0-pg16@sha256:e41e0c742ef91ece4fc7c08dda7f24e5a8f818563b164bbfea3a4364941d75f7 \
            -c shared_preload_libraries=pg_search,pg_cron \
            -c max_connections=500
          for _attempt in {1..60}; do
            if docker logs centaur-api-integration-test-postgres 2>&1 \
              | grep -q 'PostgreSQL init process complete' \
              && docker exec centaur-api-integration-test-postgres \
              psql -U postgres -d centaur -tAc 'select 1' >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs centaur-api-integration-test-postgres
          exit 1

      - name: Run API integration test
        working-directory: services/api-rs
        env:
          API_INTEGRATION_WORKFLOW_DIR: ${{ runner.temp }}/api-integration-workflows
          BIND_ADDR: 127.0.0.1:18080
          CENTAUR_API_URL: http://127.0.0.1:18080
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:15432/centaur?sslmode=disable
          RUN_MIGRATIONS: "true"
          RUST_LOG: info
          CENTAUR_CONTROL_API_KEY: api-integration-control-0000000000000001
          SLACK_FEEDBACK_API_KEY: api-integration-feedback-0000000000000002
          SLACKBOT_API_KEY: api-integration-slackbot-0000000000000003
          WORKFLOW_DIRS: ${{ runner.temp }}/api-integration-workflows
          WORKFLOW_HOST_SANDBOX: "false"
          WORKFLOW_API_KEY: api-integration-workflow-0000000000000004
          WORKFLOW_REAP_REMOVED_AFTER_TICKS: "1"
          WORKFLOW_RECONCILE_INTERVAL_SECS: "1"
        run: |
          mkdir -p "$API_INTEGRATION_WORKFLOW_DIR"
          cargo build --locked -p centaur-api-server -p centaur-api-integration-test

          ./target/debug/centaur-api-server > "$RUNNER_TEMP/centaur-api-server.log" 2>&1 &
          api_pid="$!"
          echo "$api_pid" > "$RUNNER_TEMP/centaur-api-server.pid"
          trap 'kill "$api_pid" 2>/dev/null || true' EXIT

          ./target/debug/centaur-api-integration-test

      - name: Dump API integration test logs
        if: ${{ failure() }}
        run: |
          cat "$RUNNER_TEMP/centaur-api-server.log" || true
          docker logs centaur-api-integration-test-postgres || true

      - name: Cleanup API integration test dependencies
        if: ${{ always() }}
        run: |
          if [ -f "$RUNNER_TEMP/centaur-api-server.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/centaur-api-server.pid")" 2>/dev/null || true
          fi
          docker rm -f centaur-api-integration-test-postgres || true

  slack-archive-privacy:
    name: Slack archive privacy tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.slack_archive_privacy == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install pytest==8.4.2

      - name: Verify archive import privacy boundaries
        run: python -m pytest workflows/slack/tests/test_archive_import.py

  slackbotv2-tests:
    name: Slackbot v2 tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.slackbotv2_tests == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1
          run_install: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Slackbot v2 tests
        working-directory: services/slackbotv2
        run: bun test test

  linearbot-tests:
    name: Linearbot typecheck and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1
          run_install: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: services/linearbot
        run: bun run check:types

      - name: Linearbot tests
        working-directory: services/linearbot
        run: bun test test

  discordbot-checks:
    name: Discordbot typecheck and tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.discordbot_checks == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1
          run_install: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      # Workspace-root install: discordbot links @centaur/* workspace packages
      # and relies on the root pnpm patches.
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Discordbot
        working-directory: services/discordbot
        run: bun run check:types

      - name: Discordbot tests
        working-directory: services/discordbot
        run: bun run test

  githubbot-checks:
    name: Githubbot typecheck and tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.githubbot_checks == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1
          run_install: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      # Workspace-root install: githubbot links @centaur/* workspace packages
      # and relies on the root pnpm patches.
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Githubbot
        working-directory: services/githubbot
        run: bun run check:types

      - name: Githubbot tests
        working-directory: services/githubbot
        run: bun run test

  teamsbot-checks:
    name: Teamsbot typecheck and tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.teamsbot_checks == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1
          run_install: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Teamsbot
        working-directory: services/teamsbot
        run: bun run check:types

      - name: Teamsbot tests
        working-directory: services/teamsbot
        run: bun run test

  shared-node-packages:
    name: Shared API client and rendering checks
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.shared_node_packages == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1
          run_install: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared packages
        run: |
          pnpm --filter @centaur/api-client exec tsc --noEmit
          pnpm --filter @centaur/rendering typecheck

      - name: Test shared packages
        run: |
          pnpm --filter @centaur/api-client test
          pnpm --filter @centaur/rendering test

  python-surfaces:
    name: Sandbox, workflow, and Slack Python tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.python_surfaces == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: |
          python -m pip install pytest==8.4.2 tomli-w==1.2.0 uv==0.11.6 ./tools/productivity/slack
          uv sync --project services/workflow-python --locked

      - name: Test sandbox bootstrap
        run: python -m pytest services/sandbox/test_*.py

      - name: Test workflow library
        env:
          PYTHONPATH: workflows
        run: python -m pytest workflows/tests workflows/slack/tests

      - name: Test workflow host
        run: |
          uv run --project services/workflow-python python -m unittest discover \
            -s services/workflow-python/tests -p 'test_*.py'

      - name: Test Slack tool
        env:
          PYTHONPATH: tools/productivity
        run: python -m pytest tools/productivity/slack/tests

  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - ci_changes
      - migration-order
      - rust-api
      - slack-archive-privacy
      - slackbotv2-tests
      - discordbot-checks
      - githubbot-checks
      - teamsbot-checks
      - shared-node-packages
      - python-surfaces
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-skips: migration-order, rust-api, slack-archive-privacy, slackbotv2-tests, discordbot-checks, githubbot-checks, teamsbot-checks, shared-node-packages, python-surfaces
          jobs: ${{ toJSON(needs) }}
