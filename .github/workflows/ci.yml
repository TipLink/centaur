name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci_changes:
    name: Detect CI changes
    runs-on: ubuntu-latest
    outputs:
      migration_order: ${{ steps.filter.outputs.migration_order }}
      rust_api: ${{ steps.filter.outputs.rust_api }}
      sandbox_config_tests: ${{ steps.filter.outputs.sandbox_config_tests }}
      slackbotv2_tests: ${{ steps.filter.outputs.slackbotv2_tests }}
      linearbot_tests: ${{ steps.filter.outputs.linearbot_tests }}
      discordbot_checks: ${{ steps.filter.outputs.discordbot_checks }}
      teamsbot_checks: ${{ steps.filter.outputs.teamsbot_checks }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - id: filter
        name: Detect changed paths
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            changed_files="$(git diff --name-only "${base}...HEAD")"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            changed_files="$(git diff --name-only "${{ github.event.before }}...HEAD")"
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            base="${{ github.event.merge_group.base_sha }}"
            changed_files="$(git diff --name-only "${base}...HEAD")"
          else
            base_ref="${{ github.base_ref || 'main' }}"
            if git rev-parse --verify --quiet "origin/${base_ref}" >/dev/null; then
              changed_files="$(git diff --name-only "origin/${base_ref}...HEAD")"
            else
              git fetch --no-tags --depth=1 origin "${base_ref}"
              changed_files="$(git diff --name-only FETCH_HEAD...HEAD)"
            fi
          fi

          matches() {
            local pattern
            for pattern in "$@"; do
              if printf '%s\n' "${changed_files}" | grep -Eq "${pattern}"; then
                return 0
              fi
            done
            return 1
          }

          set_output() {
            local name="$1"
            shift
            if matches "$@"; then
              echo "${name}=true" >>"${GITHUB_OUTPUT}"
            else
              echo "${name}=false" >>"${GITHUB_OUTPUT}"
            fi
          }

          set_output migration_order \
            '^services/api-rs/crates/centaur-session-sqlx/migrations/' \
            '^services/console/db/migrate/' \
            '^\.github/scripts/check-migration-order\.sh$' \
            '^\.github/workflows/ci\.yml$'
          set_output rust_api \
            '^services/api-rs/' \
            '^\.github/rollback-bridge-reviewed-forward-commit$' \
            '^\.github/scripts/check-rollback-bridge-workflows\.sh$' \
            '^\.github/scripts/resolve-runnable-image-digest\.sh$' \
            '^\.github/scripts/test-resolve-runnable-image-digest\.sh$' \
            '^\.github/scripts/test-rollback-bridge-publication-trigger\.sh$' \
            '^\.github/scripts/test-probe-rollback-agent-image\.sh$' \
            '^\.github/scripts/verify-reviewed-rollback-release\.sh$' \
            '^\.github/scripts/test-verify-reviewed-rollback-release\.sh$' \
            '^\.github/workflows/publish-images\.yml$' \
            '^\.github/workflows/validate-images\.yml$' \
            '^scripts/probe-rollback-agent-image\.sh$' \
            '^\.github/workflows/ci\.yml$'
          set_output sandbox_config_tests \
            '^services/sandbox/configure_codex_config\.py$' \
            '^services/sandbox/test_configure_codex_config\.py$' \
            '^services/sandbox/install_tool_shims\.py$' \
            '^services/sandbox/test_install_tool_shims\.py$' \
            '^services/sandbox/Dockerfile$' \
            '^services/sandbox/entrypoint\.sh$' \
            '^\.github/workflows/ci\.yml$'
          set_output slackbotv2_tests \
            '^services/slackbotv2/' \
            '^package\.json$' \
            '^pnpm-lock\.yaml$' \
            '^pnpm-workspace\.yaml$' \
            '^\.github/workflows/ci\.yml$'
          set_output linearbot_tests \
            '^services/linearbot/' \
            '^package\.json$' \
            '^pnpm-lock\.yaml$' \
            '^pnpm-workspace\.yaml$' \
            '^\.github/workflows/ci\.yml$'
          set_output discordbot_checks \
            '^services/discordbot/' \
            '^package\.json$' \
            '^pnpm-lock\.yaml$' \
            '^pnpm-workspace\.yaml$' \
            '^\.github/workflows/ci\.yml$'
          set_output teamsbot_checks \
            '^services/teamsbot/' \
            '^package\.json$' \
            '^pnpm-lock\.yaml$' \
            '^pnpm-workspace\.yaml$' \
            '^\.github/workflows/ci\.yml$'

  sandbox-config-tests:
    name: Sandbox Codex config tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.sandbox_config_tests == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Test sandbox Codex config generation
        run: python3 services/sandbox/test_configure_codex_config.py

      - name: Test sandbox tool shim installation
        run: python3 services/sandbox/test_install_tool_shims.py

  migration-order:
    name: Migration order
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.migration_order == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check migration versions
        run: .github/scripts/check-migration-order.sh "origin/${{ github.base_ref || 'main' }}"

  rust-api:
    name: Rust API fmt, clippy, and tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.rust_api == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Resolve the single reviewed forward commit pin
        id: forward_pin
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          commit="$(tr -d '\r\n' < .github/rollback-bridge-reviewed-forward-commit)"
          if [[ ! "$commit" =~ ^[0-9a-f]{40}$ ]]; then
            echo ".github/rollback-bridge-reviewed-forward-commit must contain the frozen lowercase 40-character commit SHA" >&2
            exit 1
          fi
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: services/api-rs

      - name: Format
        working-directory: services/api-rs
        run: cargo fmt --all --check

      - name: Verify rollback bridge workflow safety
        run: bash .github/scripts/check-rollback-bridge-workflows.sh

      - name: Clippy
        working-directory: services/api-rs
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Verify rollback bridge forward migration provenance
        env:
          REVIEWED_FORWARD_COMMIT: ${{ steps.forward_pin.outputs.commit }}
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          fixture_dir=services/api-rs/crates/centaur-api-server/tests/fixtures/forward_migrations
          embedded_dir=services/api-rs/crates/centaur-session-sqlx/migrations
          (
            cd "$fixture_dir"
            sha256sum --check SHA256SUMS
          )
          sha384sum --check "$embedded_dir/.checksums.sha384"
          git fetch --no-tags --depth=1 origin "$REVIEWED_FORWARD_COMMIT"
          while IFS=' ' read -r _ file; do
            source_copy="$RUNNER_TEMP/$file"
            git show "$REVIEWED_FORWARD_COMMIT:$embedded_dir/$file" > "$source_copy"
            cmp "$source_copy" "$fixture_dir/$file"
            cmp "$source_copy" "$embedded_dir/$file"
          done < "$fixture_dir/SHA256SUMS"

      - name: Start Rust test database
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          docker run --detach --name centaur-rust-test-postgres \
            --publish 127.0.0.1:5432:5432 \
            --env POSTGRES_USER=postgres \
            --env POSTGRES_PASSWORD=postgres \
            --env POSTGRES_DB=postgres \
            paradedb/paradedb@sha256:e41e0c742ef91ece4fc7c08dda7f24e5a8f818563b164bbfea3a4364941d75f7 \
            -c shared_preload_libraries=pg_search,pg_cron \
            -c max_connections=500
          for _ in {1..60}; do
            if docker logs centaur-rust-test-postgres 2>&1 \
              | grep -q 'PostgreSQL init process complete' \
              && docker exec centaur-rust-test-postgres \
              psql -U postgres -d postgres -tAc 'select 1' >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs centaur-rust-test-postgres
          exit 1

      - name: Test
        working-directory: services/api-rs
        env:
          SESSION_RUNTIME_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          SESSION_SQLX_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: cargo test --workspace

      - name: Cleanup Rust test database
        if: ${{ always() }}
        run: docker rm -f centaur-rust-test-postgres || true

      - name: Start API integration test dependencies
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          docker run --detach --name centaur-api-integration-test-postgres \
            --publish 127.0.0.1:15432:5432 \
            --env POSTGRES_USER=postgres \
            --env POSTGRES_PASSWORD=postgres \
            --env POSTGRES_DB=centaur \
            paradedb/paradedb@sha256:e41e0c742ef91ece4fc7c08dda7f24e5a8f818563b164bbfea3a4364941d75f7 \
            -c shared_preload_libraries=pg_search,pg_cron \
            -c max_connections=500
          for _ in {1..60}; do
            if docker logs centaur-api-integration-test-postgres 2>&1 \
              | grep -q 'PostgreSQL init process complete' \
              && docker exec centaur-api-integration-test-postgres \
              psql -U postgres -d centaur -tAc 'select 1' >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs centaur-api-integration-test-postgres
          exit 1

      - name: Checkout reviewed forward source for cross-version rehearsal
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: TipLink/centaur
          ref: ${{ steps.forward_pin.outputs.commit }}
          path: reviewed-forward
          persist-credentials: false

      - name: Build and verify reviewed forward runtime
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/reviewed-forward-target
          SESSION_RUNTIME_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:15432/centaur?sslmode=disable
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          cargo build --locked \
            --manifest-path reviewed-forward/services/api-rs/Cargo.toml \
            -p centaur-api-server
          cargo test --locked \
            --manifest-path reviewed-forward/services/api-rs/Cargo.toml \
            -p centaur-session-runtime \
            rollback_era_clear_and_reassignment_cannot_spoof_forward_content_stamp \
            -- --nocapture

      - name: Apply API integration schema with reviewed forward runtime
        working-directory: reviewed-forward/services/api-rs
        env:
          BIND_ADDR: 127.0.0.1:18081
          CENTAUR_CONTROL_API_KEY: integration-control-key-0123456789abcdef
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:15432/centaur?sslmode=disable
          PYTHON_WORKFLOW_HOST_PATH: ${{ github.workspace }}/reviewed-forward/services/workflow-python/workflow_host.py
          PYTHON_WORKFLOW_HOST_PYTHON: python3
          RUN_MIGRATIONS: "true"
          RUST_LOG: warn
          SESSION_EXECUTION_ADOPTION_INTERVAL_SECS: "0"
          WORKFLOW_DIRS: ${{ runner.temp }}/reviewed-forward-schema-workflows
          WORKFLOW_HOST_SANDBOX: "false"
          WORKFLOW_REAP_REMOVED_AFTER_TICKS: "0"
          WORKFLOW_RECONCILE_INTERVAL_SECS: "0"
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          mkdir -p "$WORKFLOW_DIRS"
          "${{ runner.temp }}/reviewed-forward-target/debug/centaur-api-server" \
            > "$RUNNER_TEMP/reviewed-forward-schema.log" 2>&1 &
          forward_pid="$!"
          trap 'kill "$forward_pid" 2>/dev/null || true' EXIT
          for _ in {1..60}; do
            if curl --fail --silent http://127.0.0.1:18081/readyz >/dev/null; then
              kill "$forward_pid"
              wait "$forward_pid" || true
              trap - EXIT
              exit 0
            fi
            if ! kill -0 "$forward_pid" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/reviewed-forward-schema.log"
          exit 1

      - name: Run API integration test
        working-directory: services/api-rs
        env:
          API_INTEGRATION_WORKFLOW_DIR: ${{ runner.temp }}/api-integration-workflows
          BIND_ADDR: 127.0.0.1:18080
          CENTAUR_API_URL: http://127.0.0.1:18080
          CENTAUR_CONTROL_API_KEY: integration-control-key-0123456789abcdef
          CENTAUR_ROLLBACK_BRIDGE_PAUSE_WORKFLOWS: "true"
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:15432/centaur?sslmode=disable
          ROLLBACK_BRIDGE_FORWARD_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:15432/centaur?sslmode=disable
          ROLLBACK_BRIDGE_REHEARSAL_FORWARD_BIN: ${{ runner.temp }}/reviewed-forward-target/debug/centaur-api-server
          ROLLBACK_BRIDGE_REHEARSAL_FORWARD_WORKDIR: ${{ github.workspace }}/reviewed-forward/services/api-rs
          ROLLBACK_BRIDGE_REHEARSAL_FORWARD_WORKFLOW_HOST: ${{ github.workspace }}/reviewed-forward/services/workflow-python/workflow_host.py
          RUN_MIGRATIONS: "false"
          RUST_LOG: info
          WORKFLOW_DIRS: ${{ runner.temp }}/api-integration-workflows
          WORKFLOW_HOST_SANDBOX: "false"
          WORKFLOW_REAP_REMOVED_AFTER_TICKS: "1"
          WORKFLOW_RECONCILE_INTERVAL_SECS: "1"
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          mkdir -p "$API_INTEGRATION_WORKFLOW_DIR"
          cargo build --locked -p centaur-api-server -p centaur-api-integration-test
          cargo test --locked -p centaur-api-server --test rollback_bridge_forward_schema -- --nocapture

          ./target/debug/centaur-api-server > "$RUNNER_TEMP/centaur-api-server.log" 2>&1 &
          api_pid="$!"
          echo "$api_pid" > "$RUNNER_TEMP/centaur-api-server.pid"
          trap 'kill "$api_pid" 2>/dev/null || true' EXIT

          ./target/debug/centaur-api-integration-test

      - name: Dump API integration test logs
        if: ${{ failure() }}
        run: |
          cat "$RUNNER_TEMP/centaur-api-server.log" || true
          docker logs centaur-api-integration-test-postgres || true

      - name: Cleanup API integration test dependencies
        if: ${{ always() }}
        run: |
          if [ -f "$RUNNER_TEMP/centaur-api-server.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/centaur-api-server.pid")" 2>/dev/null || true
          fi
          docker rm -f centaur-api-integration-test-postgres || true

  slackbotv2-tests:
    name: Slackbot v2 tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.slackbotv2_tests == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1
          run_install: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Slackbot v2 tests
        working-directory: services/slackbotv2
        run: bun test test

  linearbot-tests:
    name: Linearbot typecheck and tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.linearbot_tests == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1
          run_install: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: services/linearbot
        run: bun run check:types

      - name: Linearbot tests
        working-directory: services/linearbot
        run: bun test test

  discordbot-checks:
    name: Discordbot typecheck and tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.discordbot_checks == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1
          run_install: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      # Workspace-root install: discordbot links @centaur/* workspace packages
      # and relies on the root pnpm patches.
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Discordbot
        working-directory: services/discordbot
        run: bun run check:types

      - name: Discordbot tests
        working-directory: services/discordbot
        run: bun run test

  teamsbot-checks:
    name: Teamsbot typecheck and tests
    runs-on: ubuntu-latest
    needs: ci_changes
    if: needs.ci_changes.outputs.teamsbot_checks == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1
          run_install: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Teamsbot
        working-directory: services/teamsbot
        run: bun run check:types

      - name: Teamsbot tests
        working-directory: services/teamsbot
        run: bun run test

  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - ci_changes
      - sandbox-config-tests
      - migration-order
      - rust-api
      - slackbotv2-tests
      - linearbot-tests
      - discordbot-checks
      - teamsbot-checks
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-skips: sandbox-config-tests, migration-order, rust-api, slackbotv2-tests, linearbot-tests, discordbot-checks, teamsbot-checks
          jobs: ${{ toJSON(needs) }}
