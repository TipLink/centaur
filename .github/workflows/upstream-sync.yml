name: Weekly Upstream Audit

on:
  schedule:
    # Monday morning PT / early afternoon ET.
    - cron: "17 14 * * 1"
  workflow_dispatch:

concurrency:
  group: upstream-audit
  cancel-in-progress: false

permissions:
  contents: read

env:
  BASE_BRANCH: main
  UPSTREAM_BRANCH: main
  UPSTREAM_OWNER: paradigmxyz
  UPSTREAM_REPO: paradigmxyz/centaur

jobs:
  open-pr:
    name: Open untrusted upstream audit PR
    runs-on: ubuntu-latest
    steps:
      - name: Create pull-request-only GitHub App token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          app-id: ${{ vars.FINEAS_GITHUB_APP_ID }}
          private-key: ${{ secrets.FINEAS_GITHUB_APP_PRIVATE_KEY }}
          owner: TipLink
          repositories: centaur
          permission-pull-requests: write

      - name: Checkout trusted base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Audit upstream ancestry and signatures
        id: audit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          parent="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.parent.full_name // empty')"
          if [[ "$parent" != "$UPSTREAM_REPO" ]]; then
            echo "expected $GITHUB_REPOSITORY to remain a fork of $UPSTREAM_REPO; found ${parent:-none}" >&2
            exit 1
          fi

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch --no-tags origin "${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}"
          git fetch --no-tags upstream "${UPSTREAM_BRANCH}:refs/remotes/upstream/${UPSTREAM_BRANCH}"

          base_sha="$(git rev-parse "origin/${BASE_BRANCH}")"
          upstream_sha="$(git rev-parse "upstream/${UPSTREAM_BRANCH}")"
          merge_base="$(git merge-base "$base_sha" "$upstream_sha")"
          {
            echo "base_sha=$base_sha"
            echo "upstream_sha=$upstream_sha"
            echo "merge_base=$merge_base"
          } >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor "$upstream_sha" "$base_sha"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "verified_commit_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t commits < <(git rev-list --reverse "${base_sha}..${upstream_sha}")
          if [[ "${#commits[@]}" -eq 0 ]]; then
            echo "upstream is not contained, but no upstream-only commits were found" >&2
            exit 1
          fi
          failed=()
          for commit in "${commits[@]}"; do
            verification="$(gh api "repos/${UPSTREAM_REPO}/commits/${commit}" \
              --jq '[.commit.verification.verified, .commit.verification.reason] | @tsv')"
            verified="${verification%%$'\t'*}"
            reason="${verification#*$'\t'}"
            if [[ "$verified" != "true" ]]; then
              failed+=("${commit}:${reason:-unknown}")
            fi
          done
          if [[ "${#failed[@]}" -ne 0 ]]; then
            printf 'refusing unverified upstream commit(s):\n' >&2
            printf '  %s\n' "${failed[@]}" >&2
            exit 1
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "verified_commit_count=${#commits[@]}" >> "$GITHUB_OUTPUT"

      - name: Close stale audit PR when already contained
        if: steps.audit.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail
          existing_pr="$(gh api \
            "repos/${GITHUB_REPOSITORY}/pulls?state=open&base=${BASE_BRANCH}&head=${UPSTREAM_OWNER}:${UPSTREAM_BRANCH}&per_page=100" \
            --jq '.[0].number // empty')"
          if [[ -n "$existing_pr" ]]; then
            gh pr close "$existing_pr" --repo "$GITHUB_REPOSITORY" \
              --comment "Closing because ${UPSTREAM_REPO}/${UPSTREAM_BRANCH} is already contained in ${BASE_BRANCH}."
          fi

      - name: Build audit PR body
        if: steps.audit.outputs.changed == 'true'
        env:
          BASE_SHA: ${{ steps.audit.outputs.base_sha }}
          MERGE_BASE: ${{ steps.audit.outputs.merge_base }}
          UPSTREAM_SHA: ${{ steps.audit.outputs.upstream_sha }}
          VERIFIED_COMMIT_COUNT: ${{ steps.audit.outputs.verified_commit_count }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          from __future__ import annotations

          import os
          from pathlib import Path
          import shutil
          import subprocess
          import tempfile

          base_sha = os.environ["BASE_SHA"]
          merge_base = os.environ["MERGE_BASE"]
          upstream_sha = os.environ["UPSTREAM_SHA"]
          verified_count = int(os.environ["VERIFIED_COMMIT_COUNT"])
          base_branch = os.environ["BASE_BRANCH"]
          upstream_branch = os.environ["UPSTREAM_BRANCH"]
          upstream_owner = os.environ["UPSTREAM_OWNER"]
          upstream_repo = os.environ["UPSTREAM_REPO"]
          runner_temp = Path(os.environ["RUNNER_TEMP"])
          body_path = runner_temp / "upstream-audit-body.md"

          def git(*args: str, cwd: str | Path = ".") -> str:
              return subprocess.check_output(["git", *args], cwd=cwd, text=True).strip()

          def lines(args: list[str]) -> list[str]:
              output = git(*args)
              return [line for line in output.splitlines() if line.strip()]

          commit_lines = lines(
              ["log", "--reverse", "--format=- `%h` %s (%cs)", f"{base_sha}..{upstream_sha}"]
          )
          file_rows = lines(["diff", "--name-status", f"{merge_base}..{upstream_sha}"])
          file_names = lines(["diff", "--name-only", f"{merge_base}..{upstream_sha}"])
          risk_prefixes = (
              ".github/workflows/",
              "contrib/chart/",
              "services/api-rs/",
              "services/sandbox/",
              "services/slackbotv2/",
          )
          risk_terms = ("migration", "migrations", ".sql")
          risk_files = [
              path
              for path in file_names
              if path.startswith(risk_prefixes) or any(term in path.lower() for term in risk_terms)
          ]

          probe_dir = Path(tempfile.mkdtemp(prefix="upstream-audit-merge-", dir=runner_temp))
          conflict_files: list[str] = []
          merge_failed = False
          try:
              git("worktree", "add", "--detach", str(probe_dir), base_sha)
              result = subprocess.run(
                  ["git", "-C", str(probe_dir), "merge", "--no-commit", "--no-ff", upstream_sha],
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
              )
              if result.returncode != 0:
                  merge_failed = True
                  conflict_files = lines(
                      ["-C", str(probe_dir), "diff", "--name-only", "--diff-filter=U"]
                  )
                  subprocess.run(
                      ["git", "-C", str(probe_dir), "merge", "--abort"],
                      check=False,
                      stdout=subprocess.DEVNULL,
                      stderr=subprocess.DEVNULL,
                  )
          finally:
              subprocess.run(
                  ["git", "worktree", "remove", "--force", str(probe_dir)],
                  check=False,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )
              shutil.rmtree(probe_dir, ignore_errors=True)

          def limited(items: list[str], *, limit: int) -> str:
              if not items:
                  return "- None"
              shown = items[:limit]
              extra = len(items) - len(shown)
              text = "\n".join(shown)
              if extra > 0:
                  text += f"\n- ...and {extra} more"
              return text

          changed_files = [f"- `{row}`" for row in file_rows]
          risky = [f"- `{path}`" for path in risk_files]
          conflicts = [f"- `{path}`" for path in conflict_files]
          compare_url = f"https://github.com/{upstream_repo}/compare/{merge_base}...{upstream_sha}"
          if conflict_files:
              merge_probe = f"Local merge probe found {len(conflict_files)} conflicting file(s)."
          elif merge_failed:
              merge_probe = "Local merge probe failed before reporting specific conflict files."
          else:
              merge_probe = "No local merge conflicts detected."

          body = f"""## Summary
          - compare `{upstream_repo}/{upstream_branch}` with `{base_branch}`
          - upstream HEAD: `{upstream_sha}`
          - base HEAD at generation: `{base_sha}`
          - GitHub-verified upstream-only commits: {verified_count}
          - files changed upstream since merge-base: {len(file_rows)}
          - merge probe: {merge_probe}

          This is a draft, untrusted cross-repository audit PR directly from
          `{upstream_owner}:{upstream_branch}`. It deliberately does not copy upstream code
          into a same-repository branch, so pull-request workflows receive the external-head
          token/secret boundary before human review. Do not merge it directly when compatibility
          work is required; create a reviewed integration branch pinned to the recorded upstream
          SHA and preserve both histories. The moving PR head is not an integration input unless
          the `Verify recorded upstream SHA and signatures` check matches this body and is green.

          ## Upstream Compare
          {compare_url}

          ## Upstream Commits
          {limited(commit_lines, limit=40)}

          ## Changed Files
          {limited(changed_files, limit=80)}

          ## Higher-Risk Areas
          {limited(risky, limit=40)}

          ## Conflicts
          {limited(conflicts, limit=40)}

          ## Required integration audit
          - Treat this PR as an upstream-delta signal, never deployment authorization.
          - Classify every fork patch as retained, superseded upstream, migrated, or dropped with evidence.
          - Re-run migration lineage, security-boundary, overlay, rollback-bridge, and immutable-descriptor gates.
          - Roll out only through the reviewed Fineas infra PR DAG and operator acceptance stages.

          Generated by the weekly upstream audit workflow.
          """
          body_path.write_text("\n".join(line.strip() for line in body.splitlines()) + "\n")
          PY

      - name: Open or update untrusted audit PR
        if: steps.audit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail
          body_file="${RUNNER_TEMP}/upstream-audit-body.md"
          existing_pr="$(gh api \
            "repos/${GITHUB_REPOSITORY}/pulls?state=open&base=${BASE_BRANCH}&head=${UPSTREAM_OWNER}:${UPSTREAM_BRANCH}&per_page=100" \
            --jq '.[0].number // empty')"
          if [[ -n "$existing_pr" ]]; then
            gh pr edit "$existing_pr" --repo "$GITHUB_REPOSITORY" \
              --title "chore: audit current upstream Centaur" \
              --body-file "$body_file"
            pr_url="$(gh pr view "$existing_pr" --repo "$GITHUB_REPOSITORY" --json url --jq .url)"
          else
            jq -n \
              --arg title "chore: audit current upstream Centaur" \
              --arg head "${UPSTREAM_OWNER}:${UPSTREAM_BRANCH}" \
              --arg base "$BASE_BRANCH" \
              --rawfile body "$body_file" \
              '{title: $title, head: $head, base: $base, body: $body, draft: true}' \
              >"${RUNNER_TEMP}/create-upstream-pr.json"
            pr_url="$(gh api --method POST "repos/${GITHUB_REPOSITORY}/pulls" \
              --input "${RUNNER_TEMP}/create-upstream-pr.json" --jq .html_url)"
          fi
          {
            echo "### Upstream audit PR"
            echo
            echo "$pr_url"
          } >> "$GITHUB_STEP_SUMMARY"
