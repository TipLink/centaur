name: Weekly Upstream Sync

on:
  schedule:
    # Monday morning PT / early afternoon ET.
    - cron: "17 14 * * 1"
  workflow_dispatch:

concurrency:
  group: upstream-sync
  cancel-in-progress: false

permissions:
  contents: read

env:
  BASE_BRANCH: main
  SYNC_BRANCH: automation/upstream-sync
  UPSTREAM_BRANCH: main
  UPSTREAM_REPO: paradigmxyz/centaur

jobs:
  open-pr:
    name: Open upstream sync PR
    runs-on: ubuntu-latest
    steps:
      - name: Create Centaur GitHub App token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          app-id: ${{ vars.FINEAS_GITHUB_APP_ID }}
          private-key: ${{ secrets.FINEAS_GITHUB_APP_PRIVATE_KEY }}
          owner: TipLink
          repositories: centaur
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app_token.outputs.token }}
          fetch-depth: 0
          persist-credentials: false

      - name: Update upstream sync branch
        id: sync
        env:
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch --no-tags \
            "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}"
          git fetch --no-tags upstream "${UPSTREAM_BRANCH}"

          base_sha="$(git rev-parse "origin/${BASE_BRANCH}")"
          upstream_sha="$(git rev-parse "upstream/${UPSTREAM_BRANCH}")"
          merge_base="$(git merge-base "$base_sha" "$upstream_sha")"

          {
            echo "base_sha=$base_sha"
            echo "upstream_sha=$upstream_sha"
            echo "merge_base=$merge_base"
          } >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor "$upstream_sha" "$base_sha"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            existing_pr="$(gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --head "$SYNC_BRANCH" \
              --base "$BASE_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // empty')"
            if [ -n "$existing_pr" ]; then
              gh pr close "$existing_pr" \
                --repo "$GITHUB_REPOSITORY" \
                --comment "Closing because ${UPSTREAM_REPO}/${UPSTREAM_BRANCH} is already contained in ${BASE_BRANCH}."
            fi
            exit 0
          fi

          git push --force \
            "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$upstream_sha:refs/heads/${SYNC_BRANCH}"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build PR body
        if: steps.sync.outputs.changed == 'true'
        env:
          BASE_SHA: ${{ steps.sync.outputs.base_sha }}
          MERGE_BASE: ${{ steps.sync.outputs.merge_base }}
          UPSTREAM_SHA: ${{ steps.sync.outputs.upstream_sha }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          from __future__ import annotations

          import os
          from pathlib import Path
          import shutil
          import subprocess
          import tempfile

          base_sha = os.environ["BASE_SHA"]
          merge_base = os.environ["MERGE_BASE"]
          upstream_sha = os.environ["UPSTREAM_SHA"]
          base_branch = os.environ["BASE_BRANCH"]
          sync_branch = os.environ["SYNC_BRANCH"]
          upstream_branch = os.environ["UPSTREAM_BRANCH"]
          upstream_repo = os.environ["UPSTREAM_REPO"]
          runner_temp = Path(os.environ["RUNNER_TEMP"])
          body_path = runner_temp / "upstream-sync-body.md"

          def git(*args: str, cwd: str | Path = ".") -> str:
              return subprocess.check_output(
                  ["git", *args],
                  cwd=cwd,
                  text=True,
              ).strip()

          def lines(command: list[str]) -> list[str]:
              output = git(*command)
              return [line for line in output.splitlines() if line.strip()]

          commit_lines = lines(
              ["log", "--reverse", "--format=- `%h` %s (%cs)", f"{base_sha}..{upstream_sha}"]
          )
          file_rows = lines(["diff", "--name-status", f"{merge_base}..{upstream_sha}"])
          file_names = lines(["diff", "--name-only", f"{merge_base}..{upstream_sha}"])

          risk_prefixes = (
              ".github/workflows/",
              "contrib/chart/",
              "services/api-rs/",
              "services/sandbox/",
              "services/slackbotv2/",
          )
          risk_terms = ("migration", "migrations", ".sql")
          risk_files = [
              path
              for path in file_names
              if path.startswith(risk_prefixes) or any(term in path.lower() for term in risk_terms)
          ]

          probe_dir = Path(tempfile.mkdtemp(prefix="upstream-sync-merge-", dir=runner_temp))
          conflict_files: list[str] = []
          merge_failed = False
          try:
              git("worktree", "add", "--detach", str(probe_dir), base_sha)
              result = subprocess.run(
                  ["git", "-C", str(probe_dir), "merge", "--no-commit", "--no-ff", upstream_sha],
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
              )
              if result.returncode != 0:
                  merge_failed = True
                  conflict_files = lines(
                      ["-C", str(probe_dir), "diff", "--name-only", "--diff-filter=U"]
                  )
                  subprocess.run(
                      ["git", "-C", str(probe_dir), "merge", "--abort"],
                      check=False,
                      stdout=subprocess.DEVNULL,
                      stderr=subprocess.DEVNULL,
                  )
          finally:
              subprocess.run(
                  ["git", "worktree", "remove", "--force", str(probe_dir)],
                  check=False,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )
              shutil.rmtree(probe_dir, ignore_errors=True)

          def limited(items: list[str], *, limit: int) -> str:
              if not items:
                  return "- None"
              shown = items[:limit]
              extra = len(items) - len(shown)
              text = "\n".join(shown)
              if extra > 0:
                  text += f"\n- ...and {extra} more"
              return text

          changed_files = [f"- `{row}`" for row in file_rows]
          risky = [f"- `{path}`" for path in risk_files]
          conflicts = [f"- `{path}`" for path in conflict_files]
          compare_url = f"https://github.com/{upstream_repo}/compare/{merge_base}...{upstream_sha}"

          if conflict_files:
              merge_probe = f"Local merge probe found {len(conflict_files)} conflicting file(s)."
          elif merge_failed:
              merge_probe = "Local merge probe failed before reporting specific conflict files."
          else:
              merge_probe = "No local merge conflicts detected."

          body = f"""## Summary
          - sync `{upstream_repo}/{upstream_branch}` into `{base_branch}`
          - upstream HEAD: `{upstream_sha}`
          - base HEAD at generation: `{base_sha}`
          - upstream commits not yet in `{base_branch}`: {len(commit_lines)}
          - files changed upstream since merge-base: {len(file_rows)}
          - merge probe: {merge_probe}

          This PR is intentionally human-in-the-loop. Merge it with a normal merge commit so TipLink-specific history stays intact.

          ## Upstream Compare
          {compare_url}

          ## Upstream Commits
          {limited(commit_lines, limit=40)}

          ## Changed Files
          {limited(changed_files, limit=80)}

          ## Higher-Risk Areas
          {limited(risky, limit=40)}

          ## Conflicts
          {limited(conflicts, limit=40)}

          ## After Merge
          - `publish-images.yml` should publish new `ghcr.io/tiplink/centaur/*` images.
          - The existing promotion job should open or update the Fineas infra PR that bumps deployed image/chart pins.
          - Merge the infra PR after reviewing the pins, then let Argo deploy.

          Generated by the weekly upstream sync workflow from `{sync_branch}`.
          """
          body_path.write_text("\n".join(line.strip() for line in body.splitlines()) + "\n")
          print(body_path)
          PY

      - name: Open or update PR
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail

          title="chore: sync upstream Centaur"
          body_file="${RUNNER_TEMP}/upstream-sync-body.md"
          existing_pr="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$SYNC_BRANCH" \
            --base "$BASE_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --body-file "$body_file"
            pr_url="$(gh pr view "$existing_pr" --repo "$GITHUB_REPOSITORY" --json url --jq .url)"
          else
            pr_url="$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "$BASE_BRANCH" \
              --head "$SYNC_BRANCH" \
              --title "$title" \
              --body-file "$body_file")"
          fi

          {
            echo "### Upstream sync PR"
            echo
            echo "$pr_url"
          } >> "$GITHUB_STEP_SUMMARY"
