name: Publish Chart

"on":
  workflow_dispatch:
    inputs:
      confirm_reviewed_main:
        description: Confirm this publish is from reviewed main
        required: true
        type: boolean

permissions: {}

jobs:
  release:
    name: Publish reviewed chart
    if: github.ref == 'refs/heads/main' && inputs.confirm_reviewed_main
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Bootstrap gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch already exists"
          else
            echo "Creating empty gh-pages branch"
            git switch --orphan gh-pages
            git commit --allow-empty -m "chore: initialize gh-pages"
            git push origin gh-pages
            git switch -
          fi

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v4.1.1

      - name: Add chart repositories
        run: helm repo add onepassword https://1password.github.io/connect-helm-charts

      - name: Build chart dependencies
        run: helm dependency build contrib/chart

      - name: Lint chart
        run: helm lint contrib/chart

      - name: Test staged compatibility rendering
        run: bash contrib/chart/tests/test_overlay_image_compat.sh

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          skip_existing: true
          charts_dir: contrib
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
