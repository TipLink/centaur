name: Publish Images

on:
  push:
    branches: [main]
    tags: [v*]
    paths:
      - .github/workflows/publish-images.yml
      - services/**
      - crates/harness-server/**
      - centaur_sdk/**
      - packages/**
      - tools/**
      - scripts/bootstrap-k8s-secrets.sh
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .agents/skills/**
  pull_request:
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: tiplink/centaur
  IMAGE_SOURCE: https://github.com/TipLink/centaur
  # Main/tags keep optimized release images. PRs and manual non-release
  # branch publishes use debug builds so staging/dev iteration does not spend
  # minutes optimizing Rust binaries that are immediately replaced by the next
  # test build.
  RUST_BUILD_PROFILE: ${{ (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v'))) && 'debug' || 'release' }}

jobs:
  # Build each image natively per platform (amd64 on x64 runners, arm64 on
  # arm runners), push by digest, and hand the digests to the merge job below
  # which assembles the multi-arch manifest. PR and manual non-release branch
  # builds stay amd64-only to keep iteration fast.
  build:
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        service: [api-rs, slackbotv2, linearbot, discordbot, teamsbot, agent, iron-proxy, console]
        platform: ${{ (github.event_name == 'push' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && fromJSON('["linux/amd64", "linux/arm64"]') || fromJSON('["linux/amd64"]') }}
        include:
          - service: api-rs
            image: centaur-api-rs
            context: .
            dockerfile: services/api-rs/Dockerfile
            target: ""
          - service: slackbotv2
            image: centaur-slackbotv2
            context: .
            dockerfile: services/slackbotv2/Dockerfile
            target: ""
          - service: linearbot
            image: centaur-linearbot
            context: .
            dockerfile: services/linearbot/Dockerfile
            target: ""
          - service: discordbot
            image: centaur-discordbot
            context: .
            dockerfile: services/discordbot/Dockerfile
            target: ""
          - service: teamsbot
            image: centaur-teamsbot
            context: .
            dockerfile: services/teamsbot/Dockerfile
            target: ""
          - service: agent
            image: centaur-agent
            context: .
            dockerfile: services/sandbox/Dockerfile
            target: sandbox
          - service: iron-proxy
            image: centaur-iron-proxy
            context: .
            dockerfile: services/iron-proxy/Dockerfile
            target: ""
          - service: console
            image: centaur-console
            context: services/console
            dockerfile: services/console/Dockerfile
            target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Derive platform slug
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_SLUG=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}
        env:
          DOCKER_METADATA_PR_HEAD_SHA: true

      - name: Build and push ${{ matrix.image }} (${{ matrix.platform }})
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Tags are applied by the merge job on the multi-arch manifest;
          # per-arch builds are pushed by digest only. Fork PRs run with a
          # read-only GITHUB_TOKEN, so they build without pushing.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=${{ !github.event.pull_request.head.repo.fork }}
          build-args: |
            RUST_BUILD_PROFILE=${{ env.RUST_BUILD_PROFILE }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache-${{ env.PLATFORM_SLUG }}
            type=gha,scope=${{ matrix.image }}-${{ env.PLATFORM_SLUG }}
          # Fork PRs run with a read-only GITHUB_TOKEN: exporting the registry
          # cache would fail the build, so only export it when we can push.
          cache-to: |
            ${{ !github.event.pull_request.head.repo.fork && format('type=registry,ref={0}/{1}/{2}:buildcache-{3},mode=max', env.REGISTRY, env.IMAGE_NAMESPACE, matrix.image, env.PLATFORM_SLUG) || '' }}
            type=gha,mode=max,scope=${{ matrix.image }}-${{ env.PLATFORM_SLUG }}

      - name: Export digest
        if: ${{ !github.event.pull_request.head.repo.fork }}
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.image }}-${{ env.PLATFORM_SLUG }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !github.event.pull_request.head.repo.fork }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: centaur-api-rs
          - image: centaur-slackbotv2
          - image: centaur-linearbot
          - image: centaur-agent
          - image: centaur-iron-proxy
          - image: centaur-console
          - image: centaur-discordbot
          - image: centaur-teamsbot

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-${{ matrix.image }}-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=main-sha-,enable={{is_default_branch}}
            type=semver,pattern={{raw}}
            type=ref,event=pr
            type=sha
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}
        env:
          DOCKER_METADATA_PR_HEAD_SHA: true

      - name: Create multi-arch manifest for ${{ matrix.image }}
        working-directory: ${{ runner.temp }}/digests
        run: |
          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("-t" "$tag")
          done

          image_refs=()
          for digest in *; do
            image_refs+=("${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}@sha256:${digest}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${image_refs[@]}"

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}

  promote-fineas-infra:
    name: Open Fineas infra promotion PR
    runs-on: ubuntu-latest
    needs: merge
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - name: Create Fineas infra GitHub App token
        id: fineas_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          app-id: ${{ vars.FINEAS_GITHUB_APP_ID }}
          private-key: ${{ secrets.FINEAS_GITHUB_APP_PRIVATE_KEY }}
          owner: TipLink
          repositories: fineas-centaur-infra
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout Fineas infra
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: TipLink/fineas-centaur-infra
          token: ${{ steps.fineas_token.outputs.token }}
          path: fineas-centaur-infra
          persist-credentials: false

      - name: Update Fineas Centaur pins
        working-directory: fineas-centaur-infra
        run: |
          set -euo pipefail
          bash scripts/bump-centaur-pins.sh "${GITHUB_SHA}"
          scripts/audit-supply-chain.sh

      - name: Open or update Fineas infra PR
        id: promote
        env:
          FINEAS_INFRA_TOKEN: ${{ steps.fineas_token.outputs.token }}
          CENTAUR_TOKEN: ${{ github.token }}
          CENTAUR_SHA: ${{ github.sha }}
          CENTAUR_REPO: ${{ github.repository }}
          CENTAUR_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 <<'PY'
          from __future__ import annotations

          import base64
          import json
          import os
          import re
          import subprocess
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          owner = "TipLink"
          repo = "fineas-centaur-infra"
          base_branch = "main"
          root = Path("fineas-centaur-infra")
          centaur_sha = os.environ["CENTAUR_SHA"]
          centaur_short = centaur_sha[:7]
          centaur_tag = f"sha-{centaur_short}"
          branch = f"automation/promote-centaur-{centaur_short}"
          message = f"chore: promote centaur {centaur_short}"
          title = f"Promote Centaur {centaur_short} to Fineas"

          headers = {
              "Authorization": f"Bearer {os.environ['FINEAS_INFRA_TOKEN']}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "centaur-promote-fineas",
          }
          api = f"https://api.github.com/repos/{owner}/{repo}"
          centaur_headers = dict(headers)
          centaur_headers["Authorization"] = f"Bearer {os.environ['CENTAUR_TOKEN']}"

          def request(
              method: str,
              url: str,
              payload: dict | None = None,
              *,
              ok: tuple[int, ...] = (200, 201, 204),
              request_headers: dict[str, str] | None = None,
          ):
              data = None
              req_headers = dict(request_headers or headers)
              if payload is not None:
                  data = json.dumps(payload).encode()
                  req_headers["Content-Type"] = "application/json"
              req = urllib.request.Request(url, data=data, headers=req_headers, method=method)
              try:
                  with urllib.request.urlopen(req) as resp:
                      body_text = resp.read().decode()
                      if resp.status not in ok:
                          raise RuntimeError(f"{method} {url} returned {resp.status}: {body_text}")
                      return json.loads(body_text) if body_text else None
              except urllib.error.HTTPError as exc:
                  body_text = exc.read().decode()
                  if exc.code in ok:
                      if exc.code == 404:
                          return None
                      return json.loads(body_text) if body_text else None
                  raise RuntimeError(f"{method} {url} returned {exc.code}: {body_text}") from None

          def centaur_pr_url_for_commit() -> str:
              repo_full = os.environ["CENTAUR_REPO"]
              url = f"https://api.github.com/repos/{repo_full}/commits/{centaur_sha}/pulls"
              try:
                  pulls = request("GET", url, request_headers=centaur_headers)
              except RuntimeError as exc:
                  print(f"warning: could not look up Centaur PR for {centaur_sha}: {exc}")
                  return ""

              merged_pulls = [pull for pull in pulls if pull.get("merged_at")]
              pull = (merged_pulls or pulls or [None])[0]
              return pull["html_url"] if pull else ""

          def git(*args: str) -> str:
              return subprocess.check_output(["git", "-C", str(root), *args], text=True)

          def set_application_annotation(key: str, value: str) -> bool:
              application_path = root / "clusters/centaur-sandbox/argocd/applications/centaur-sandbox.yaml"
              text = application_path.read_text(encoding="utf-8")
              pattern = re.compile(rf"^    {re.escape(key)}: .*$", flags=re.MULTILINE)

              if value:
                  line = f"    {key}: {json.dumps(value)}"
                  if pattern.search(text):
                      new_text = pattern.sub(line, text, count=1)
                  else:
                      marker = "    argocd.argoproj.io/compare-options: ServerSideDiff=true\n"
                      if marker not in text:
                          raise RuntimeError(f"could not place Application annotation {key}")
                      new_text = text.replace(marker, f"{marker}{line}\n", 1)
              else:
                  new_text = pattern.sub("", text)
                  new_text = re.sub(r"\n{3,}", "\n\n", new_text)

              if new_text == text:
                  return False
              application_path.write_text(new_text, encoding="utf-8")
              return True

          def put_file_to_branch(rel: str, encoded_branch: str) -> bool:
              encoded_path = urllib.parse.quote(rel, safe="")
              existing = request("GET", f"{api}/contents/{encoded_path}?ref={encoded_branch}", ok=(200, 404))
              content_bytes = (root / rel).read_bytes()
              if existing:
                  current = base64.b64decode(existing["content"]).replace(b"\r\n", b"\n")
                  if current == content_bytes:
                      return False

              payload = {
                  "message": message,
                  "content": base64.b64encode(content_bytes).decode(),
                  "branch": branch,
              }
              if existing:
                  payload["sha"] = existing["sha"]
              request("PUT", f"{api}/contents/{encoded_path}", payload)
              return True

          centaur_pr_url = centaur_pr_url_for_commit()
          source_lines = [
              f"- Centaur commit: https://github.com/{os.environ['CENTAUR_REPO']}/commit/{centaur_sha}",
              f"- Image publish run: {os.environ['CENTAUR_RUN_URL']}",
          ]
          if centaur_pr_url:
              source_lines.append(f"- Centaur PR: {centaur_pr_url}")

          body = f"""## Summary
          - update Fineas Centaur base image pins to `{centaur_tag}`
          - pin the Centaur chart source to `{centaur_sha}`

          ## Source
          {chr(10).join(source_lines)}

          ## Tests
          - `bash scripts/bump-centaur-pins.sh {centaur_sha}`
          - `scripts/audit-supply-chain.sh`
          """

          status_lines = [line for line in git("status", "--porcelain").splitlines() if line]
          changed_paths: list[tuple[str, str]] = []
          for line in status_lines:
              status = line[:2]
              path = line[3:]
              if " -> " in path:
                  path = path.split(" -> ", 1)[1]
              if status == "??":
                  kind = "A"
              elif "D" in status:
                  kind = "D"
              else:
                  kind = "M"
              changed_paths.append((kind, path))

          output_path = os.environ["GITHUB_OUTPUT"]
          if not changed_paths:
              with open(output_path, "a", encoding="utf-8") as output:
                  output.write("changed=false\n")
                  output.write(f"branch={branch}\n")
                  output.write("pr_url=\n")
              raise SystemExit(0)

          base_ref = request("GET", f"{api}/git/ref/heads/{base_branch}")
          base_sha = base_ref["object"]["sha"]
          encoded_branch = urllib.parse.quote(branch, safe="")
          try:
              request("POST", f"{api}/git/refs", {"ref": f"refs/heads/{branch}", "sha": base_sha})
          except RuntimeError as exc:
              if "Reference already exists" not in str(exc):
                  raise

          changed = False
          for kind, rel in changed_paths:
              encoded_path = urllib.parse.quote(rel, safe="")
              existing = request("GET", f"{api}/contents/{encoded_path}?ref={encoded_branch}", ok=(200, 404))
              if kind == "D":
                  if existing:
                      request(
                          "DELETE",
                          f"{api}/contents/{encoded_path}",
                          {"message": message, "branch": branch, "sha": existing["sha"]},
                      )
                      changed = True
                  continue

              content_bytes = (root / rel).read_bytes()
              if existing:
                  current = base64.b64decode(existing["content"]).replace(b"\r\n", b"\n")
                  if current == content_bytes:
                      continue

              payload = {
                  "message": message,
                  "content": base64.b64encode(content_bytes).decode(),
                  "branch": branch,
              }
              if existing:
                  payload["sha"] = existing["sha"]
              request("PUT", f"{api}/contents/{encoded_path}", payload)
              changed = True

          pulls = request(
              "GET",
              f"{api}/pulls?state=open&head={urllib.parse.quote(f'{owner}:{branch}', safe='')}",
          )
          if pulls:
              pr = request("PATCH", f"{api}/pulls/{pulls[0]['number']}", {"title": title, "body": body})
          elif changed:
              pr = request("POST", f"{api}/pulls", {"title": title, "head": branch, "base": base_branch, "body": body})
          else:
              pr = None

          if pr:
              annotations_changed = False
              annotations_changed |= set_application_annotation("fineas.dev/deployment-pr-url", pr["html_url"])
              annotations_changed |= set_application_annotation("fineas.dev/centaur-pr-url", centaur_pr_url)
              if annotations_changed:
                  put_file_to_branch(
                      "clusters/centaur-sandbox/argocd/applications/centaur-sandbox.yaml",
                      encoded_branch,
                  )

          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"changed={'true' if changed else 'false'}\n")
              output.write(f"branch={branch}\n")
              output.write(f"centaur_short={centaur_short}\n")
              if pr:
                  output.write(f"pr_url={pr['html_url']}\n")
                  output.write(f"pr_number={pr['number']}\n")
              else:
                  output.write("pr_url=\n")
          PY
