name: Publish Reviewed Images

on:
  push:
    tags:
      - 'reviewed-images-publish-*'
  workflow_dispatch:
    inputs:
      reviewed_commit:
        description: Exact signed, ready-for-review PR head to publish
        required: true
        type: string

concurrency:
  # Reviewed package tags are global state. Serialize every branch, tag, and
  # dispatch so a later run cannot race or cancel a partially published run.
  group: publish-reviewed-centaur-images
  cancel-in-progress: false

permissions:
  actions: read
  checks: read
  contents: read
  packages: write
  pull-requests: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: tiplink/centaur
  IMAGE_SOURCE: https://github.com/TipLink/centaur
  RUST_BUILD_PROFILE: release

jobs:
  release-gate:
    name: Bind publication to the reviewed signed PR head
    runs-on: ubuntu-latest
    env:
      DISPATCH_REVIEWED_COMMIT: ${{ inputs.reviewed_commit }}
      GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TRIGGER_API_URL: ${{ github.api_url }}
      TRIGGER_EVENT_NAME: ${{ github.event_name }}
      TRIGGER_REF: ${{ github.ref }}
      TRIGGER_REF_CREATED: ${{ github.event.created }}
      TRIGGER_REF_NAME: ${{ github.ref_name }}
      TRIGGER_REF_TYPE: ${{ github.ref_type }}
      TRIGGER_REPOSITORY: ${{ github.repository }}
      TRIGGER_SHA: ${{ github.sha }}
    steps:
      - name: Checkout the exact publication commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Require signed PR head and exact-head non-CodeQL checks
        run: bash .github/scripts/verify-reviewed-image-release.sh

  tag-absence-gate:
    name: Prove every reviewed image tag is unassigned
    runs-on: ubuntu-latest
    needs: release-gate
    env:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REVIEWED_TAG: reviewed-${{ github.sha }}
    steps:
      - name: Checkout immutable-tag verifier
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Reject existing or unprovably absent tags
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          for image in \
            centaur-api-rs \
            centaur-slackbotv2 \
            centaur-linearbot \
            centaur-discordbot \
            centaur-githubbot \
            centaur-teamsbot \
            centaur-agent \
            centaur-iron-proxy \
            centaur-console; do
            bash .github/scripts/verify-registry-tag-absent.sh \
              "${IMAGE_NAMESPACE}/${image}" "$REVIEWED_TAG"
          done

  # Build each image natively per platform (amd64 on x64 runners, arm64 on
  # arm runners), push by digest, and retain two distinct identities: the
  # attested per-platform root used for the final merge and its runnable child
  # manifest. Pull requests are validated by the separate read-only workflow;
  # only the signed, exact checked PR head reaches this package-write lane.
  build:
    needs: tag-absence-gate
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        service: [api-rs, slackbotv2, linearbot, discordbot, githubbot, teamsbot, agent, iron-proxy, console]
        platform: [linux/amd64, linux/arm64]
        include:
          - service: api-rs
            image: centaur-api-rs
            context: .
            dockerfile: services/api-rs/Dockerfile
            target: ""
          - service: slackbotv2
            image: centaur-slackbotv2
            context: .
            dockerfile: services/slackbotv2/Dockerfile
            target: ""
          - service: linearbot
            image: centaur-linearbot
            context: .
            dockerfile: services/linearbot/Dockerfile
            target: ""
          - service: discordbot
            image: centaur-discordbot
            context: .
            dockerfile: services/discordbot/Dockerfile
            target: ""
          - service: githubbot
            image: centaur-githubbot
            context: .
            dockerfile: services/githubbot/Dockerfile
            target: ""
          - service: teamsbot
            image: centaur-teamsbot
            context: .
            dockerfile: services/teamsbot/Dockerfile
            target: ""
          - service: agent
            image: centaur-agent
            context: .
            dockerfile: services/sandbox/Dockerfile
            target: sandbox
          - service: iron-proxy
            image: centaur-iron-proxy
            context: .
            dockerfile: services/iron-proxy/Dockerfile
            target: ""
          - service: console
            image: centaur-console
            context: services/console
            dockerfile: services/console/Dockerfile
            target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Derive platform slug
        run: |
          set -euo pipefail
          platform="${{ matrix.platform }}"
          echo "PLATFORM_SLUG=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}
        env:
          DOCKER_METADATA_PR_HEAD_SHA: true

      - name: Build and push ${{ matrix.image }} (${{ matrix.platform }})
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Tags are applied by the merge job on the multi-arch manifest;
          # per-arch release builds are pushed by digest only.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true
          build-args: |
            RUST_BUILD_PROFILE=${{ env.RUST_BUILD_PROFILE }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache-${{ env.PLATFORM_SLUG }}
            type=gha,scope=${{ matrix.image }}-${{ env.PLATFORM_SLUG }}
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache-${{ env.PLATFORM_SLUG }},mode=max
            type=gha,mode=max,scope=${{ matrix.image }}-${{ env.PLATFORM_SLUG }}

      - name: Export attested root and runnable platform child digests
        env:
          BUILD_ROOT_DIGEST: ${{ steps.build.outputs.digest }}
          BUILD_IMAGE: ${{ matrix.image }}
          BUILD_PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          if [[ ! "$BUILD_ROOT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "invalid attested build root digest for $BUILD_IMAGE: $BUILD_ROOT_DIGEST" >&2
            exit 1
          fi
          mkdir -p "${{ runner.temp }}/merge-root-digests"
          touch "${{ runner.temp }}/merge-root-digests/${BUILD_ROOT_DIGEST#sha256:}"

          platform_os=${BUILD_PLATFORM%%/*}
          platform_architecture=${BUILD_PLATFORM##*/}
          runnable_digest="$(bash .github/scripts/resolve-runnable-image-digest.sh \
            "${REGISTRY}/${IMAGE_NAMESPACE}/${BUILD_IMAGE}@${BUILD_ROOT_DIGEST}" \
            "$platform_os" "$platform_architecture")"
          if [[ ! "$runnable_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "invalid runnable child digest for $BUILD_IMAGE ($BUILD_PLATFORM): $runnable_digest" >&2
            exit 1
          fi
          mkdir -p "${{ runner.temp }}/runnable-child-digests"
          touch "${{ runner.temp }}/runnable-child-digests/${runnable_digest#sha256:}"

      - name: Upload attested platform root digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: merge-root-digests-${{ matrix.image }}-${{ env.PLATFORM_SLUG }}
          path: ${{ runner.temp }}/merge-root-digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload runnable platform child digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runnable-child-digests-${{ matrix.image }}-${{ env.PLATFORM_SLUG }}
          path: ${{ runner.temp }}/runnable-child-digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: centaur-api-rs
          - image: centaur-slackbotv2
          - image: centaur-linearbot
          - image: centaur-agent
          - image: centaur-iron-proxy
          - image: centaur-console
          - image: centaur-discordbot
          - image: centaur-githubbot
          - image: centaur-teamsbot

    steps:
      - name: Checkout immutable-tag verifier
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download attested platform root digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: merge-root-digests-${{ matrix.image }}-*
          path: ${{ runner.temp }}/merge-root-digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Recheck absence and create immutable reviewed manifest
        working-directory: ${{ runner.temp }}/merge-root-digests
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEWED_TAG: reviewed-${{ github.sha }}
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          repository="${IMAGE_NAMESPACE}/${{ matrix.image }}"
          mapfile -t root_digest_files < <(find . -maxdepth 1 -type f -print)
          if [[ "${#root_digest_files[@]}" -ne 2 ]]; then
            echo "expected exactly two attested platform roots for ${{ matrix.image }}; found ${#root_digest_files[@]}" >&2
            exit 1
          fi
          image_refs=()
          for digest_file in "${root_digest_files[@]}"; do
            digest="sha256:$(basename "$digest_file")"
            if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "invalid attested platform root for ${{ matrix.image }}: $digest" >&2
              exit 1
            fi
            image_refs+=("${REGISTRY}/${repository}@${digest}")
          done

          # Keep this single-assignment proof immediately adjacent to the only
          # command that can create the final reviewed tag.
          bash "$GITHUB_WORKSPACE/.github/scripts/verify-registry-tag-absent.sh" \
            "$repository" "$REVIEWED_TAG"
          docker buildx imagetools create \
            -t "${REGISTRY}/${repository}:${REVIEWED_TAG}" \
            "${image_refs[@]}"

      - name: Inspect immutable reviewed manifest
        run: |
          set -euo pipefail
          docker buildx imagetools inspect \
            "${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image }}:reviewed-${GITHUB_SHA}"

  release-descriptor:
    name: Publish reviewed linux/arm64 release descriptor
    runs-on: ubuntu-latest
    needs: merge
    steps:
      - name: Download this run's runnable linux/arm64 child digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: runnable-child-digests-*-linux-arm64
          path: ${{ runner.temp }}/arm64-runnable-child-digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write release descriptor
        env:
          RELEASE_REVISION: ${{ github.sha }}
          ARM64_RUNNABLE_DIGEST_ROOT: ${{ runner.temp }}/arm64-runnable-child-digests
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          if [[ ! "$RELEASE_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo "invalid release revision: $RELEASE_REVISION" >&2
            exit 1
          fi
          tag="reviewed-${RELEASE_REVISION}"
          printf 'component\trepository\ttag\tdigest\trevision\n' > centaur-release.tsv
          while IFS=$'\t' read -r component image; do
            repository="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${image}"
            index_json="$(docker buildx imagetools inspect "${repository}:${tag}" --raw)"
            mapfile -t arm64_digests < <(jq -r '
              [.manifests[]
                | select(.platform.os == "linux" and .platform.architecture == "arm64")
                | .digest] | .[]' <<<"$index_json")
            if [[ "${#arm64_digests[@]}" -ne 1 ]]; then
              echo "expected one runnable linux/arm64 manifest for $image; found ${#arm64_digests[@]}" >&2
              exit 1
            fi
            digest="${arm64_digests[0]}"
            if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "invalid arm64 digest for $image: $digest" >&2
              exit 1
            fi
            artifact_dir="${ARM64_RUNNABLE_DIGEST_ROOT}/runnable-child-digests-${image}-linux-arm64"
            mapfile -t run_child_digest_files < <(find "$artifact_dir" -maxdepth 1 -type f -print)
            if [[ "${#run_child_digest_files[@]}" -ne 1 ]]; then
              echo "expected one runnable arm64 child artifact for $image; found ${#run_child_digest_files[@]}" >&2
              exit 1
            fi
            run_child_digest="sha256:$(basename "${run_child_digest_files[0]}")"
            if [[ ! "$run_child_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "invalid runnable arm64 child artifact for $image: $run_child_digest" >&2
              exit 1
            fi
            if [[ "$digest" != "$run_child_digest" ]]; then
              echo "reviewed tag arm64 child for $image does not match this run: tag=$digest run_child=$run_child_digest" >&2
              exit 1
            fi
            # Prove the platform child itself is pullable. The multi-arch tag
            # points at an OCI index; Fineas deploys tag@child-digest and its
            # live verifier compares that child imageID, never the tag index.
            docker buildx imagetools inspect "${repository}@${digest}" >/dev/null
            printf '%s\tghcr.io/tiplink/centaur/%s\t%s\t%s\t%s\n' \
              "$component" "$image" "$tag" "$digest" "$RELEASE_REVISION" \
              >> centaur-release.tsv
          done <<'COMPONENTS'
          api-rs	centaur-api-rs
          slackbotv2	centaur-slackbotv2
          sandbox	centaur-agent
          iron-proxy	centaur-iron-proxy
          console	centaur-console
          COMPONENTS

      - name: Upload release descriptor
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: centaur-linux-arm64-release-${{ github.sha }}
          path: centaur-release.tsv
          if-no-files-found: error
          retention-days: 90
