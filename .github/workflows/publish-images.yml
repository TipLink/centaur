name: Publish Reviewed Images

on:
  push:
    tags: [v*]
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: tiplink/centaur
  IMAGE_SOURCE: https://github.com/TipLink/centaur
  RUST_BUILD_PROFILE: release

jobs:
  # Build each image natively per platform (amd64 on x64 runners, arm64 on
  # arm runners), push by digest, and hand the digests to the merge job below
  # which assembles the multi-arch manifest. Pull requests are validated by the
  # separate read-only Validate Images workflow; only reviewed tags or an
  # explicit dispatch reach this package-write publication lane.
  build:
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        service: [api-rs, slackbotv2, linearbot, discordbot, githubbot, teamsbot, agent, iron-proxy, console]
        platform: [linux/amd64, linux/arm64]
        include:
          - service: api-rs
            image: centaur-api-rs
            context: .
            dockerfile: services/api-rs/Dockerfile
            target: ""
          - service: slackbotv2
            image: centaur-slackbotv2
            context: .
            dockerfile: services/slackbotv2/Dockerfile
            target: ""
          - service: linearbot
            image: centaur-linearbot
            context: .
            dockerfile: services/linearbot/Dockerfile
            target: ""
          - service: discordbot
            image: centaur-discordbot
            context: .
            dockerfile: services/discordbot/Dockerfile
            target: ""
          - service: githubbot
            image: centaur-githubbot
            context: .
            dockerfile: services/githubbot/Dockerfile
            target: ""
          - service: teamsbot
            image: centaur-teamsbot
            context: .
            dockerfile: services/teamsbot/Dockerfile
            target: ""
          - service: agent
            image: centaur-agent
            context: .
            dockerfile: services/sandbox/Dockerfile
            target: sandbox
          - service: iron-proxy
            image: centaur-iron-proxy
            context: .
            dockerfile: services/iron-proxy/Dockerfile
            target: ""
          - service: console
            image: centaur-console
            context: services/console
            dockerfile: services/console/Dockerfile
            target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Derive platform slug
        run: |
          set -euo pipefail
          platform="${{ matrix.platform }}"
          echo "PLATFORM_SLUG=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}
        env:
          DOCKER_METADATA_PR_HEAD_SHA: true

      - name: Build and push ${{ matrix.image }} (${{ matrix.platform }})
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Tags are applied by the merge job on the multi-arch manifest;
          # per-arch release builds are pushed by digest only.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            RUST_BUILD_PROFILE=${{ env.RUST_BUILD_PROFILE }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache-${{ env.PLATFORM_SLUG }}
            type=gha,scope=${{ matrix.image }}-${{ env.PLATFORM_SLUG }}
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache-${{ env.PLATFORM_SLUG }},mode=max
            type=gha,mode=max,scope=${{ matrix.image }}-${{ env.PLATFORM_SLUG }}

      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.image }}-${{ env.PLATFORM_SLUG }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: centaur-api-rs
          - image: centaur-slackbotv2
          - image: centaur-linearbot
          - image: centaur-agent
          - image: centaur-iron-proxy
          - image: centaur-console
          - image: centaur-discordbot
          - image: centaur-githubbot
          - image: centaur-teamsbot

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-${{ matrix.image }}-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=main-sha-,enable={{is_default_branch}}
            type=semver,pattern={{raw}}
            type=ref,event=pr
            type=sha
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}
        env:
          DOCKER_METADATA_PR_HEAD_SHA: true

      - name: Create multi-arch manifest for ${{ matrix.image }}
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("-t" "$tag")
          done

          image_refs=()
          for digest in *; do
            image_refs+=("${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}@sha256:${digest}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${image_refs[@]}"

      - name: Inspect manifest
        run: |
          set -euo pipefail
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}

  release-descriptor:
    name: Publish reviewed linux/arm64 release descriptor
    runs-on: ubuntu-latest
    needs: merge
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write release descriptor
        env:
          RELEASE_REVISION: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo "invalid release revision: $RELEASE_REVISION" >&2
            exit 1
          fi
          tag="sha-${RELEASE_REVISION::7}"
          printf 'component\trepository\ttag\tdigest\trevision\n' > centaur-release.tsv
          while IFS=$'\t' read -r component image; do
            repository="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${image}"
            index_json="$(docker buildx imagetools inspect "${repository}:${tag}" --raw)"
            mapfile -t arm64_digests < <(jq -r '
              [.manifests[]
                | select(.platform.os == "linux" and .platform.architecture == "arm64")
                | .digest] | .[]' <<<"$index_json")
            if [[ "${#arm64_digests[@]}" -ne 1 ]]; then
              echo "expected one runnable linux/arm64 manifest for $image; found ${#arm64_digests[@]}" >&2
              exit 1
            fi
            digest="${arm64_digests[0]}"
            if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "invalid arm64 digest for $image: $digest" >&2
              exit 1
            fi
            # Prove the platform child itself is pullable. The multi-arch tag
            # points at an OCI index; Kubernetes imageID reports this child
            # manifest, so the reviewed lock records the child, not the index.
            docker buildx imagetools inspect "${repository}@${digest}" >/dev/null
            printf '%s\tghcr.io/tiplink/centaur/%s\t%s\t%s\t%s\n' \
              "$component" "$image" "$tag" "$digest" "$RELEASE_REVISION" \
              >> centaur-release.tsv
          done <<'COMPONENTS'
          api-rs	centaur-api-rs
          slackbotv2	centaur-slackbotv2
          sandbox	centaur-agent
          iron-proxy	centaur-iron-proxy
          console	centaur-console
          COMPONENTS

      - name: Upload release descriptor
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: centaur-linux-arm64-release-${{ github.sha }}
          path: centaur-release.tsv
          if-no-files-found: error
          retention-days: 90
