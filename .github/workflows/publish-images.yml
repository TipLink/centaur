name: Publish Reviewed Rollback Bridge Images

on:
  workflow_dispatch:
    inputs:
      live_updater_scope_verified:
        description: Operator attests live child annotations exclude all four bridge repositories and every relevant rule excludes reviewed-40 tags
        required: true
        type: boolean
        default: false
      reviewed_forward_commit:
        description: Exact frozen reviewed-forward commit recorded by this bridge
        required: true
        type: string
  push:
    tags:
      - 'rollback-bridge-publish-live-scope-verified-*'

concurrency:
  # Tags are global registry state, so every dispatch must serialize across
  # branches and refs before any digest or manifest is published.
  group: publish-reviewed-rollback-bridge-images
  # A second dispatch must wait and observe the first run's immutable tags.
  cancel-in-progress: false

permissions:
  actions: read
  checks: read
  contents: read
  packages: write
  pull-requests: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: tiplink/centaur
  IMAGE_SOURCE: https://github.com/TipLink/centaur
  RUST_BUILD_PROFILE: release

jobs:
  release-gate:
    name: Confirm rollback publication barriers
    runs-on: ubuntu-latest
    outputs:
      forward_commit: ${{ steps.forward_pin.outputs.commit }}
    env:
      DISPATCH_FORWARD_COMMIT: ${{ inputs.reviewed_forward_commit }}
      GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      LIVE_UPDATER_SCOPE_VERIFIED: ${{ inputs.live_updater_scope_verified }}
      TRIGGER_API_URL: ${{ github.api_url }}
      TRIGGER_EVENT_NAME: ${{ github.event_name }}
      TRIGGER_REF: ${{ github.ref }}
      TRIGGER_REF_CREATED: ${{ github.event.created }}
      TRIGGER_REF_NAME: ${{ github.ref_name }}
      TRIGGER_REF_TYPE: ${{ github.ref_type }}
      TRIGGER_REPOSITORY: ${{ github.repository }}
      TRIGGER_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Require an exact reviewed publication trigger
        id: forward_pin
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          commit="$(tr -d '\r\n' < .github/rollback-bridge-reviewed-forward-commit)"
          if [[ ! "$commit" =~ ^[0-9a-f]{40}$ ]]; then
            echo ".github/rollback-bridge-reviewed-forward-commit must contain the frozen lowercase 40-character commit SHA" >&2
            exit 1
          fi
          bridge_commit="$(git rev-parse HEAD)"
          if [[ ! "$bridge_commit" =~ ^[0-9a-f]{40}$ ]]; then
            echo "checked-out rollback bridge revision is not a full lowercase commit SHA" >&2
            exit 1
          fi
          object_type="$(git cat-file -t "$TRIGGER_SHA" 2>/dev/null || true)"
          if [[ "$object_type" != "commit" || "$bridge_commit" != "$TRIGGER_SHA" ]]; then
            echo "publication trigger must resolve directly to the exact checked-out bridge commit" >&2
            exit 1
          fi

          case "$TRIGGER_EVENT_NAME" in
            workflow_dispatch)
              if [[ "$LIVE_UPDATER_SCOPE_VERIFIED" != "true" ]]; then
                echo "read the live child annotations and verify that none of the four exact bridge repositories is in image-list and every relevant allow-tags rule excludes reviewed-40 before publication" >&2
                exit 1
              fi
              if [[ "$DISPATCH_FORWARD_COMMIT" != "$commit" ]]; then
                echo "dispatch reviewed_forward_commit does not match the bridge's frozen forward commit" >&2
                exit 1
              fi
              ;;
            push)
              if [[ "$TRIGGER_REF_TYPE" != "tag" || "$TRIGGER_REF_CREATED" != "true" ||
                "$TRIGGER_REF" != "refs/tags/${TRIGGER_REF_NAME}" ]]; then
                echo "publication tag trigger must be a newly created tag ref" >&2
                exit 1
              fi
              tag_pattern='^rollback-bridge-publish-live-scope-verified-([0-9a-f]{40})-forward-([0-9a-f]{40})-at-([1-9][0-9]{9})$'
              if [[ ! "$TRIGGER_REF_NAME" =~ $tag_pattern ]]; then
                echo "publication tag does not match the exact live-scope attestation format" >&2
                exit 1
              fi
              tag_bridge_commit="${BASH_REMATCH[1]}"
              tag_forward_commit="${BASH_REMATCH[2]}"
              attested_at="${BASH_REMATCH[3]}"
              if [[ "$tag_bridge_commit" != "$bridge_commit" ||
                "$tag_forward_commit" != "$commit" ]]; then
                echo "publication tag bridge or forward commit does not match the reviewed checkout" >&2
                exit 1
              fi
              encoded_ref="$(jq -nr --arg value "$TRIGGER_REF_NAME" '$value|@uri')"
              ref_json="$(curl --fail --silent --show-error \
                --header "Authorization: Bearer ${GITHUB_API_TOKEN}" \
                --header 'Accept: application/vnd.github+json' \
                --header 'X-GitHub-Api-Version: 2022-11-28' \
                "${TRIGGER_API_URL}/repos/${TRIGGER_REPOSITORY}/git/ref/tags/${encoded_ref}")"
              if [[ "$(jq -er '.ref' <<<"$ref_json")" != "$TRIGGER_REF" ||
                "$(jq -er '.object.type' <<<"$ref_json")" != "commit" ||
                "$(jq -er '.object.sha' <<<"$ref_json")" != "$TRIGGER_SHA" ]]; then
                echo "publication ref must be a lightweight tag directly targeting the trigger commit" >&2
                exit 1
              fi
              now="$(date +%s)"
              if ((attested_at > now + 120)); then
                echo "publication tag live-scope timestamp is more than 120 seconds in the future" >&2
                exit 1
              fi
              if ((now - attested_at > 900)); then
                echo "publication tag live-scope proof is older than 900 seconds; rerun the read-only helper and create a new tag" >&2
                exit 1
              fi
              ;;
            *)
              echo "unsupported rollback bridge publication trigger: $TRIGGER_EVENT_NAME" >&2
              exit 1
              ;;
          esac
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Require signed ready PR and exact-head non-CodeQL checks
        run: bash .github/scripts/verify-reviewed-rollback-release.sh

  tag-absence-gate:
    name: Prove reviewed tags do not already exist before publishing digests
    runs-on: ubuntu-latest
    needs: release-gate
    env:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REVIEWED_TAG: reviewed-${{ github.sha }}
    steps:
      - name: Reject overwrite and fail closed on registry errors
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          for image in centaur-api-rs centaur-slackbotv2 centaur-agent centaur-iron-proxy; do
            repository="${IMAGE_NAMESPACE}/${image}"
            token_json="$(curl --fail --silent --show-error \
              --user "${GITHUB_ACTOR}:${GHCR_TOKEN}" \
              --get \
              --data-urlencode "scope=repository:${repository}:pull" \
              --data-urlencode "service=ghcr.io" \
              https://ghcr.io/token)"
            registry_token="$(jq -er '.token' <<<"$token_json")"
            response_body="$(mktemp)"
            if ! status="$(curl --silent --show-error \
              --output "$response_body" \
              --write-out '%{http_code}' \
              --header "Authorization: Bearer ${registry_token}" \
              --header 'Accept: application/vnd.oci.image.index.v1+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.docker.distribution.manifest.v2+json' \
              "https://ghcr.io/v2/${repository}/manifests/${REVIEWED_TAG}")"; then
              echo "registry request failed while checking ${repository}:${REVIEWED_TAG}" >&2
              exit 1
            fi
            case "$status" in
              404)
                if ! jq -e 'any(.errors[]?; .code == "MANIFEST_UNKNOWN")' "$response_body" >/dev/null; then
                  echo "registry returned HTTP 404 without MANIFEST_UNKNOWN for ${repository}:${REVIEWED_TAG}" >&2
                  cat "$response_body" >&2
                  exit 1
                fi
                ;;
              200)
                echo "refusing to overwrite immutable reviewed tag: ${repository}:${REVIEWED_TAG}" >&2
                exit 1
                ;;
              *)
                echo "registry returned HTTP $status while checking ${repository}:${REVIEWED_TAG}" >&2
                cat "$response_body" >&2
                exit 1
                ;;
            esac
            rm -f "$response_body"
          done

  # Build each image natively per platform (amd64 on x64 runners, arm64 on
  # arm runners), push by digest, and hand the attested index digests to the
  # merge job below which assembles the multi-arch manifest. The build also
  # records the exact runnable child selected from each index so the release
  # descriptor can bind the final platform tag to this run. Package writes
  # require either the confirmed manual path or the exact,
  # short-lived contents-write tag attestation validated above.
  build:
    needs: tag-absence-gate
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        service: [api-rs, slackbotv2, agent, iron-proxy]
        platform: [linux/amd64, linux/arm64]
        include:
          - service: api-rs
            image: centaur-api-rs
            context: .
            dockerfile: services/api-rs/Dockerfile
            target: ""
          - service: slackbotv2
            image: centaur-slackbotv2
            context: .
            dockerfile: services/slackbotv2/Dockerfile
            target: ""
          - service: agent
            image: centaur-agent
            context: .
            dockerfile: services/sandbox/Dockerfile
            target: sandbox
          - service: iron-proxy
            image: centaur-iron-proxy
            context: .
            dockerfile: services/iron-proxy/Dockerfile
            target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Derive platform slug
        run: |
          set -euo pipefail
          platform="${{ matrix.platform }}"
          echo "PLATFORM_SLUG=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}

      - name: Build and push ${{ matrix.image }} (${{ matrix.platform }})
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Tags are applied by the merge job on the multi-arch manifest;
          # per-arch release builds are pushed by digest only.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            RUST_BUILD_PROFILE=${{ env.RUST_BUILD_PROFILE }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache-${{ env.PLATFORM_SLUG }}
            type=gha,scope=${{ matrix.image }}-${{ env.PLATFORM_SLUG }}
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache-${{ env.PLATFORM_SLUG }},mode=max
            type=gha,mode=max,scope=${{ matrix.image }}-${{ env.PLATFORM_SLUG }}

      - name: Export attested index and runnable platform digests
        env:
          BUILD_INDEX_DIGEST: ${{ steps.build.outputs.digest }}
          BUILD_IMAGE: ${{ matrix.image }}
          BUILD_PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          if [[ ! "$BUILD_INDEX_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "invalid attested build index digest for $BUILD_IMAGE: $BUILD_INDEX_DIGEST" >&2
            exit 1
          fi
          mkdir -p "${{ runner.temp }}/merge-index-digests"
          touch "${{ runner.temp }}/merge-index-digests/${BUILD_INDEX_DIGEST#sha256:}"

          platform_os=${BUILD_PLATFORM%%/*}
          platform_architecture=${BUILD_PLATFORM##*/}
          runnable_digest="$(bash .github/scripts/resolve-runnable-image-digest.sh \
            "${REGISTRY}/${IMAGE_NAMESPACE}/${BUILD_IMAGE}@${BUILD_INDEX_DIGEST}" \
            "$platform_os" \
            "$platform_architecture")"
          if [[ ! "$runnable_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "invalid runnable build digest for $BUILD_IMAGE ($BUILD_PLATFORM): $runnable_digest" >&2
            exit 1
          fi
          mkdir -p "${{ runner.temp }}/runnable-digests"
          touch "${{ runner.temp }}/runnable-digests/${runnable_digest#sha256:}"

      - name: Upload attested index digest for manifest merge
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: merge-index-digests-${{ matrix.image }}-${{ env.PLATFORM_SLUG }}
          path: ${{ runner.temp }}/merge-index-digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload runnable platform child digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runnable-digests-${{ matrix.image }}-${{ env.PLATFORM_SLUG }}
          path: ${{ runner.temp }}/runnable-digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: centaur-api-rs
          - image: centaur-slackbotv2
          - image: centaur-agent
          - image: centaur-iron-proxy

    steps:
      - name: Download attested index digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: merge-index-digests-${{ matrix.image }}-*
          path: ${{ runner.temp }}/merge-index-digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=reviewed-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}

      - name: Create multi-arch manifest for ${{ matrix.image }}
        working-directory: ${{ runner.temp }}/merge-index-digests
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEWED_TAG: reviewed-${{ github.sha }}
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          repository="${IMAGE_NAMESPACE}/${{ matrix.image }}"
          token_json="$(curl --fail --silent --show-error \
            --user "${GITHUB_ACTOR}:${GHCR_TOKEN}" \
            --get \
            --data-urlencode "scope=repository:${repository}:pull" \
            --data-urlencode "service=ghcr.io" \
            https://ghcr.io/token)"
          registry_token="$(jq -er '.token' <<<"$token_json")"
          response_body="$(mktemp)"
          if ! status="$(curl --silent --show-error \
            --output "$response_body" \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer ${registry_token}" \
            --header 'Accept: application/vnd.oci.image.index.v1+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.docker.distribution.manifest.v2+json' \
            "https://ghcr.io/v2/${repository}/manifests/${REVIEWED_TAG}")"; then
            echo "registry request failed while rechecking ${repository}:${REVIEWED_TAG}" >&2
            exit 1
          fi
          case "$status" in
            404)
              if ! jq -e 'any(.errors[]?; .code == "MANIFEST_UNKNOWN")' "$response_body" >/dev/null; then
                echo "registry returned HTTP 404 without MANIFEST_UNKNOWN for ${repository}:${REVIEWED_TAG}" >&2
                cat "$response_body" >&2
                exit 1
              fi
              ;;
            200)
              echo "refusing to overwrite immutable reviewed tag during final recheck: ${repository}:${REVIEWED_TAG}" >&2
              exit 1
              ;;
            *)
              echo "registry returned HTTP $status while rechecking ${repository}:${REVIEWED_TAG}" >&2
              cat "$response_body" >&2
              exit 1
              ;;
          esac
          rm -f "$response_body"

          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("-t" "$tag")
          done

          mapfile -t merge_index_digest_files < <(find . -maxdepth 1 -type f -print)
          if [[ "${#merge_index_digest_files[@]}" -ne 2 ]]; then
            echo "expected exactly two attested platform index digests for ${{ matrix.image }}; found ${#merge_index_digest_files[@]}" >&2
            exit 1
          fi
          image_refs=()
          for digest_file in "${merge_index_digest_files[@]}"; do
            digest="sha256:$(basename "$digest_file")"
            if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "invalid attested platform index digest for ${{ matrix.image }}: $digest" >&2
              exit 1
            fi
            image_refs+=("${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}@${digest}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${image_refs[@]}"

      - name: Inspect manifest
        run: |
          set -euo pipefail
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}

  release-descriptor:
    name: Publish reviewed linux/arm64 release descriptor
    runs-on: ubuntu-latest
    needs: merge
    steps:
      - name: Download this run's runnable linux/arm64 child digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: runnable-digests-*-linux-arm64
          path: ${{ runner.temp }}/arm64-runnable-digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write release descriptor
        env:
          RELEASE_REVISION: ${{ github.sha }}
          ARM64_RUNNABLE_DIGEST_ROOT: ${{ runner.temp }}/arm64-runnable-digests
        run: |
          set -euo pipefail
          IFS=$'\n\t'
          if [[ ! "$RELEASE_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo "invalid release revision: $RELEASE_REVISION" >&2
            exit 1
          fi
          tag="reviewed-${RELEASE_REVISION}"
          printf 'component\trepository\ttag\tdigest\trevision\n' > centaur-release.tsv
          while IFS=$'\t' read -r component image; do
            repository="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${image}"
            index_json="$(docker buildx imagetools inspect "${repository}:${tag}" --raw)"
            mapfile -t arm64_digests < <(jq -r '
              [.manifests[]
                | select(.platform.os == "linux" and .platform.architecture == "arm64")
                | .digest] | .[]' <<<"$index_json")
            if [[ "${#arm64_digests[@]}" -ne 1 ]]; then
              echo "expected one runnable linux/arm64 manifest for $image; found ${#arm64_digests[@]}" >&2
              exit 1
            fi
            digest="${arm64_digests[0]}"
            if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "invalid arm64 digest for $image: $digest" >&2
              exit 1
            fi
            artifact_dir="${ARM64_RUNNABLE_DIGEST_ROOT}/runnable-digests-${image}-linux-arm64"
            mapfile -t run_child_digest_files < <(find "$artifact_dir" -maxdepth 1 -type f -print)
            if [[ "${#run_child_digest_files[@]}" -ne 1 ]]; then
              echo "expected one runnable linux/arm64 child digest artifact for $image; found ${#run_child_digest_files[@]}" >&2
              exit 1
            fi
            run_child_digest="sha256:$(basename "${run_child_digest_files[0]}")"
            if [[ ! "$run_child_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "invalid runnable linux/arm64 child digest for $image: $run_child_digest" >&2
              exit 1
            fi
            if [[ "$digest" != "$run_child_digest" ]]; then
              echo "reviewed tag arm64 child for $image does not match this run: tag=$digest run_child=$run_child_digest" >&2
              exit 1
            fi
            # Prove the platform child itself is pullable. The multi-arch tag
            # points at an OCI index; Kubernetes imageID reports this child
            # manifest, so the reviewed lock records the child, not the index.
            docker buildx imagetools inspect "${repository}@${digest}" >/dev/null
            printf '%s\tghcr.io/tiplink/centaur/%s\t%s\t%s\t%s\n' \
              "$component" "$image" "$tag" "$digest" "$RELEASE_REVISION" \
              >> centaur-release.tsv
          done <<'COMPONENTS'
          api-rs	centaur-api-rs
          slackbotv2	centaur-slackbotv2
          sandbox	centaur-agent
          iron-proxy	centaur-iron-proxy
          COMPONENTS

      - name: Upload release descriptor
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: centaur-linux-arm64-release-${{ github.sha }}
          path: centaur-release.tsv
          if-no-files-found: error
          retention-days: 90
