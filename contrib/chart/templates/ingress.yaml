{{- $hasSlackbotV2 := .Values.slackbotv2.enabled -}}
{{- $hasLinearbot := .Values.linearbot.enabled -}}
{{- if and .Values.ingress.enabled (or $hasSlackbotV2 $hasLinearbot) }}
{{- if and .Values.ingress.defaultBackend $hasSlackbotV2 $hasLinearbot }}
{{- fail "ingress.defaultBackend cannot be used when both slackbotv2.enabled and linearbot.enabled are true; set ingress.defaultBackend=false to render path rules" }}
{{- end }}
{{- $ingressComponent := "slackbotv2" -}}
{{- if and (not $hasSlackbotV2) $hasLinearbot -}}
{{- $ingressComponent = "linearbot" -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" $ingressComponent) }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" $ingressComponent) | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.defaultBackend }}
  defaultBackend:
    service:
      name: {{ include "centaur.componentName" (dict "root" . "component" $ingressComponent) }}
      port:
        number: 3001
  {{- else }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
{{- if $hasLinearbot }}
          # Linear webhook deliveries route to the linearbot; everything else
          # stays with slackbotv2 (the catch-all below). Funnel-style
          # defaultBackend ingresses cannot route both — use httpRoutes or a
          # second ingress there.
          - path: /api/webhooks/linear
            pathType: Prefix
            backend:
              service:
                name: {{ include "centaur.componentName" (dict "root" . "component" "linearbot") }}
                port:
                  number: 3001
{{- end }}
{{- if $hasSlackbotV2 }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "centaur.componentName" (dict "root" . "component" "slackbotv2") }}
                port:
                  number: 3001
{{- end }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
{{ toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
