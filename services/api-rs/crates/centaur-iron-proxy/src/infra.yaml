proxy:
  # Codex compaction calls can legitimately take longer than iron-proxy's
  # default 30s response-header timeout. Keep model-provider calls from being
  # cut off while OpenAI is still computing the first response byte.
  upstream_response_header_timeout: "120s"

transforms:
  - name: secrets
    config:
      secrets:
        # The Helm bootstrap guarantees the canonical `github-app` credential
        # exists before api-rs starts. Register this source on the shared infra
        # role so every new sandbox principal receives the rotating token.
        # Replace the placeholder instead of injecting a header: git HTTPS uses
        # Basic x-access-token auth while the REST API uses Bearer, and both
        # must preserve their caller-selected scheme.
        - id: github-app
          source:
            type: token_broker
            credential_id: github-app
          replace:
            proxy_value: GITHUB_TOKEN
            match_headers: ["Authorization"]
          rules:
            - { host: github.com }
            - { host: api.github.com }
