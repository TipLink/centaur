transforms:
  - name: secrets
    config:
      secrets:
        - replace:
            proxy_value: XAI_API_KEY
            match_headers: ["Authorization"]
          rules: [{ host: api.x.ai }]
        - replace:
            proxy_value: GEMINI_API_KEY
            match_headers: ["X-Goog-Api-Key"]
          rules: [{ host: generativelanguage.googleapis.com }]
        - replace:
            proxy_value: AMP_API_KEY
            match_headers: ["Authorization"]
          rules: [{ host: ampcode.com }]
        # GitHub App installation tokens expire ~1h after mint, so a static
        # placeholder baked into the sandbox at start goes stale within a
        # long-lived (~48h) sandbox. Resolve through the token broker instead:
        # the `github-app` broker credential is managed by iron-control (a
        # `github_app` BrokerCredential, provisioned out of band via
        # `centaur-perms broker create --kind github_app`) which mints and
        # rotates the installation token, so every request gets a live token.
        - source:
            type: token_broker
            credential_id: github-app
          inject:
            header: Authorization
            formatter: "Bearer {{.Value}}"
          rules:
            - { host: github.com }
            - { host: api.github.com }
        - replace:
            proxy_value: SLACK_BOT_TOKEN
            match_headers: ["Authorization"]
          rules: [{ host: "*.slack.com" }]
